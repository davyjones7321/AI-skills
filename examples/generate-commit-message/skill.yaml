skill:
  id: generate-commit-message
  version: 1.0.0
  name: Commit Message Generator
  description: |
    Generates conventional commit messages from code diffs.
    Follows the Conventional Commits specification (feat, fix, docs, style, refactor, test, chore).
    Produces a concise subject line and optional body with context.
  author: ai-skills-team
  license: MIT
  tags: [git, developer-tools, code, productivity, commits]

  inputs:
    - name: diff
      type: string
      description: The git diff output showing code changes
      required: true

    - name: context
      type: string
      description: Optional additional context about what the change does
      required: false
      default: ""

    - name: style
      type: string
      description: Commit message style to follow
      required: false
      default: conventional
      enum: [conventional, simple, detailed]

  outputs:
    - name: commit_message
      type: string
      description: The generated commit message (subject line)

    - name: commit_body
      type: string
      description: Optional longer description explaining the change

    - name: commit_type
      type: string
      description: The conventional commit type (feat, fix, docs, etc.)

  execution:
    type: prompt
    model_hint: any
    system_prompt: |
      You are an expert developer who writes clean, descriptive git commit messages.
      Follow the Conventional Commits specification strictly.
      Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore.
      Subject line must be under 72 characters, imperative mood, no period at end.
      Always respond in valid JSON format.
    prompt_template: |
      Generate a {style} commit message for this code diff.

      Additional context: {context}

      Respond in JSON with these fields:
      - commit_type: The conventional commit type
      - commit_message: Subject line (under 72 chars, imperative mood)
      - commit_body: Optional longer description (2-3 sentences max)

      Diff:
      {diff}
    output_parser: json

  compatible_with:
    - langchain
    - autogen
    - crewai
    - semantic_kernel
    - raw_api

  benchmarks:
    avg_latency_ms: 800
    avg_cost_per_call_usd: 0.002
    last_evaluated: 2026-02-01
    test_cases:
      - id: add-feature
        description: Generate commit message for a new feature
        input:
          diff: |
            diff --git a/src/auth.py b/src/auth.py
            --- a/src/auth.py
            +++ b/src/auth.py
            @@ -10,6 +10,15 @@ class AuthService:
            +    def reset_password(self, email: str) -> bool:
            +        """Send password reset email to the user."""
            +        user = self.db.find_user_by_email(email)
            +        if not user:
            +            return False
            +        token = self.generate_reset_token(user.id)
            +        self.email_service.send_reset_email(email, token)
            +        return True
          context: "Adding password reset functionality"
          style: conventional
        expected:
          commit_type: "feat"

      - id: fix-bug
        description: Generate commit message for a bug fix
        input:
          diff: |
            diff --git a/src/utils.py b/src/utils.py
            --- a/src/utils.py
            +++ b/src/utils.py
            @@ -22,7 +22,7 @@ def parse_date(date_str):
            -        return datetime.strptime(date_str, "%Y-%m-%d")
            +        return datetime.strptime(date_str.strip(), "%Y-%m-%d")
          context: "Date parsing failed when input had trailing whitespace"
          style: conventional
        expected:
          commit_type: "fix"
