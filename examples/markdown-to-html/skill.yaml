skill:
  id: markdown-to-html
  version: 1.0.0
  name: Markdown to HTML Converter
  description: |
    Converts Markdown text to HTML. Supports headers, bold, italic,
    links, images, code blocks, blockquotes, unordered lists,
    ordered lists, and horizontal rules.
  author: ai-skills-team
  license: MIT
  tags: [markdown, html, converter, utility, text]

  inputs:
    - name: markdown
      type: string
      description: The Markdown text to convert
      required: true

  outputs:
    - name: html
      type: string
      description: The converted HTML string

  execution:
    type: code
    language: python
    code: |
      def run(inputs):
          import re

          md = inputs["markdown"]
          lines = md.split('\n')
          html_lines = []
          in_code_block = False
          in_list = None

          for line in lines:
              # Code blocks
              if line.strip().startswith('```'):
                  if in_code_block:
                      html_lines.append('</code></pre>')
                      in_code_block = False
                  else:
                      lang = line.strip()[3:].strip()
                      cls = f' class="language-{lang}"' if lang else ''
                      html_lines.append(f'<pre><code{cls}>')
                      in_code_block = True
                  continue

              if in_code_block:
                  escaped = line.replace('&', '&amp;').replace('<', '&lt;').replace('>', '&gt;')
                  html_lines.append(escaped)
                  continue

              # Close open lists if line is not a list item
              if in_list and not re.match(r'^[\s]*[-*]\s', line) and not re.match(r'^[\s]*\d+\.\s', line) and line.strip():
                  html_lines.append(f'</{in_list}>')
                  in_list = None

              # Horizontal rules
              if re.match(r'^(---|\*\*\*|___)\s*$', line):
                  html_lines.append('<hr>')
                  continue

              # Headers
              header_match = re.match(r'^(#{1,6})\s+(.+)$', line)
              if header_match:
                  level = len(header_match.group(1))
                  text = header_match.group(2)
                  html_lines.append(f'<h{level}>{text}</h{level}>')
                  continue

              # Blockquotes
              if line.startswith('> '):
                  text = line[2:]
                  html_lines.append(f'<blockquote>{text}</blockquote>')
                  continue

              # Unordered lists
              ul_match = re.match(r'^[\s]*[-*]\s+(.+)$', line)
              if ul_match:
                  if in_list != 'ul':
                      if in_list:
                          html_lines.append(f'</{in_list}>')
                      html_lines.append('<ul>')
                      in_list = 'ul'
                  html_lines.append(f'<li>{ul_match.group(1)}</li>')
                  continue

              # Ordered lists
              ol_match = re.match(r'^[\s]*\d+\.\s+(.+)$', line)
              if ol_match:
                  if in_list != 'ol':
                      if in_list:
                          html_lines.append(f'</{in_list}>')
                      html_lines.append('<ol>')
                      in_list = 'ol'
                  html_lines.append(f'<li>{ol_match.group(1)}</li>')
                  continue

              # Empty lines
              if not line.strip():
                  if in_list:
                      html_lines.append(f'</{in_list}>')
                      in_list = None
                  html_lines.append('')
                  continue

              # Inline formatting
              formatted = line
              # Images (before links)
              formatted = re.sub(r'!\[([^\]]*)\]\(([^)]+)\)', r'<img src="\2" alt="\1">', formatted)
              # Links
              formatted = re.sub(r'\[([^\]]+)\]\(([^)]+)\)', r'<a href="\2">\1</a>', formatted)
              # Bold
              formatted = re.sub(r'\*\*(.+?)\*\*', r'<strong>\1</strong>', formatted)
              formatted = re.sub(r'__(.+?)__', r'<strong>\1</strong>', formatted)
              # Italic
              formatted = re.sub(r'\*(.+?)\*', r'<em>\1</em>', formatted)
              formatted = re.sub(r'_(.+?)_', r'<em>\1</em>', formatted)
              # Inline code
              formatted = re.sub(r'`([^`]+)`', r'<code>\1</code>', formatted)

              html_lines.append(f'<p>{formatted}</p>')

          if in_list:
              html_lines.append(f'</{in_list}>')
          if in_code_block:
              html_lines.append('</code></pre>')

          return {"html": '\n'.join(html_lines)}

  compatible_with:
    - langchain
    - autogen
    - crewai
    - raw_api

  benchmarks:
    avg_latency_ms: 2
    avg_cost_per_call_usd: 0.000
    last_evaluated: 2026-02-01
    test_cases:
      - id: headers
        description: Convert headers
        input:
          markdown: "# Hello World\n## Subtitle"
        expected:
          html_contains: ["<h1>Hello World</h1>", "<h2>Subtitle</h2>"]

      - id: mixed-content
        description: Convert mixed markdown content
        input:
          markdown: "# Title\n\nThis is **bold** and *italic* text.\n\n- Item 1\n- Item 2\n\n> A blockquote"
        expected:
          html_contains: ["<h1>", "<strong>", "<em>", "<li>", "<blockquote>"]
