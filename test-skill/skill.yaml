skill:
  id: explain-code
  version: 1.0.0
  name: Code Explainer
  description: |
    Explains a code snippet in plain English with a short summary
    and step-by-step breakdown. Supports any programming language.
  author: davyjones7321
  license: MIT
  tags: [code, explanation, developer-tools, productivity]

  inputs:
    - name: code
      type: string
      description: The code snippet to explain
      required: true

    - name: detail_level
      type: string
      description: Level of detail — "brief" or "detailed"
      required: false
      default: brief

  outputs:
    - name: summary
      type: string
      description: One-sentence plain-English summary of what the code does

    - name: steps
      type: array
      items: string
      description: Step-by-step breakdown of the code logic

  execution:
    type: prompt
    model_hint: any
    system_prompt: |
      You are a senior developer who explains code clearly to any skill level.
      Be accurate, concise, and avoid jargon where possible.
    prompt_template: |
      Explain the following code in plain English.
      Detail level: {detail_level}

      Respond in exactly this format:
      SUMMARY: [one sentence summary]
      STEPS:
      - [step 1]
      - [step 2]
      - [step 3]

      Code:
      ```
      {code}
      ```
    output_parser: structured

  compatible_with:
    - langchain
    - autogen
    - crewai
    - semantic_kernel
    - raw_api

  benchmarks:
    avg_latency_ms: 900
    avg_cost_per_call_usd: 0.002
    last_evaluated: 2026-03-28
    test_cases:
      - id: python-loop
        description: Explain a simple Python loop
        input:
          code: "for i in range(5): print(i * 2)"
          detail_level: brief
        expected:
          summary_contains: [loop, print]
          steps_count_min: 2
          steps_count_max: 5
      - id: js-fetch
        description: Explain a JS fetch call
        input:
          code: "fetch('/api/data').then(res => res.json()).then(data => console.log(data))"
          detail_level: detailed
        expected:
          summary_contains: [fetch, API]
          steps_count_min: 3
